<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanNotes™</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f7fa;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 5px;
}



textarea {
    width: 100%;
    height: 150px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #2cd44a;
    margin-bottom: 15px;
    box-sizing: border-box;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #2cd44a;
    margin-bottom: 15px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    background-color: #047ed4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background-color: #1a5edb;
}

.support-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 999;
    padding: 6px 12px;
    font-size: 13px;
    background: transparent;
    color: #047ed4;
    border: 2px solid #047ed4;
    border-radius: 8px;
    text-decoration: none;
}

.support-btn:hover {
    background-color: #1a5edb;
    color: white;
}

#micBtn {
    width: auto;
    padding: 6px 12px;
    font-size: 14px;
    position: absolute;
    right: 10px;
    bottom: 10px;
    background-color: #2cd44a;
}

#micBtn:hover {
    background-color: #28bf43;
}

.pulsing {
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(241,141,59, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(241,141,59, 0); }
    100% { box-shadow: 0 0 0 0 rgba(241,141,59, 0); }
}

.output {
    margin-top: 25px;
}

.section {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    border: 1px solid #2cd44a;
}

.copy-btn {
    margin-top: 10px;
    font-size: 14px;
    padding: 8px;
    cursor: pointer;
    transition: opacity 0.3s ease;
}

.copy-btn.fade {
    opacity: 0.5;
}

#generateBtn {
    position: relative;
    overflow: hidden;
}

#generateBtn.loading {
    pointer-events: none;
    color: transparent;
}

#generateBtn.loading::after {
    content: "Generating...";
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: white;
}

#generateBtn.loading::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: var(--progress, 0%);
    background-color: rgba(255,255,255,0.25);
    transition: width 0.2s linear;
}

.formatted-output {
    line-height: 1.7;
    font-size: 16px;
}

.formatted-output p {
    margin: 0 0 15px 0;
}

.formatted-output h3 {
    color: #024473;
}

.formatted-output h4 {
    margin-bottom: 0;
}

@media (max-width: 600px) {
    .donate-btn {
        margin-bottom: 40px;
    }
}
#alertBox {
    margin-bottom: 15px;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
}

#alertBox.show {
    display: block;
}

#alertBox.error {
    background-color: #ffe6e6;
    color: #a30000;
    border: 1px solid #ffb3b3;
}

#alertBox.success {
    background-color: #e6ffed;
    color: #046b2d;
    border: 1px solid #b3ffc7;
}

#alertContainer {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.alert {
    position: relative;
    padding: 12px 40px 12px 16px; /* more right space */
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(-10px);
    animation: fadeIn 0.3s ease forwards;
    pointer-events: auto; /* ensure clickable */
}

.alert-close {
    position: absolute;
    top: 50%;
    right: 14px; /* moved further right */
    transform: translateY(-50%);
    font-size: 16px;
    cursor: pointer;
    opacity: 0.6;
    user-select: none;
    z-index: 2; /* ensure it's above */
}

.alert-close:hover {
    opacity: 1;
}

.alert.success {
    background-color: #e6ffed;
    color: #046b2d;
    border: 1px solid #b3ffc7;
    text-align: center;
}

.alert.error {
    background-color: #ffe6e6;
    color: #a30000;
    border: 1px solid #ffb3b3;
    text-align: center;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: translateY(-10px);
    }
}

</style>
</head>

<body>

<a href="https://donate.stripe.com/00w9ATcEog2y3u5g5Eew800" target="_blank" class="support-btn">
    Keep CleanNotes™ Free
</a>

<div class="container">
    <h1>
        Clean<span style="color: #047ed4;">Notes</span>&trade;<br>
        <span style="font-size: 75%">Clinical Documentation Engine</span>
    </h1>

<div id="alertContainer"></div>

    <input id="emailInput" type="email" placeholder="Enter your email (optional)">

    <div style="position: relative;">
        <textarea id="inputText" placeholder="Type or paste your raw clinical notes here..."></textarea>
        <button id="micBtn" type="button">🎤 Record Notes</button>
    </div>

    <button id="generateBtn" onclick="generateOutput()">
        Generate CleanNotes™
    </button>

    <div class="output" id="output"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
// ===== GENERATE =====

function showAlert(message, type = "error") {
    const container = document.getElementById("alertContainer");

    const alert = document.createElement("div");
    alert.className = `alert ${type}`;

    // Create message node
    const textNode = document.createElement("span");
    textNode.innerText = message;

    // Create close button
    const closeBtn = document.createElement("span");
    closeBtn.className = "alert-close";
    closeBtn.innerHTML = "&times;";

    alert.appendChild(textNode);
    alert.appendChild(closeBtn);
    container.appendChild(alert);

    const removeAlert = () => {
        alert.style.animation = "fadeOut 0.3s ease forwards";
        setTimeout(() => alert.remove(), 300);
    };

    const timeout = setTimeout(removeAlert, 3500);

    closeBtn.addEventListener("click", () => {
        clearTimeout(timeout);
        removeAlert();
    });
}

async function generateOutput() {
    const btn = document.getElementById("generateBtn");
    const outputEl = document.getElementById("output");
    const input = document.getElementById("inputText").value;
    const email = document.getElementById("emailInput").value;

    if (!input.trim()) {
        showAlert("Please enter your clinical notes.");
        return;
    }

    btn.classList.add("loading");

    let progress = 0;
    const interval = setInterval(() => {
        progress += (95 - progress) * 0.08;
        btn.style.setProperty("--progress", progress + "%");
    }, 200);

    try {
        const response = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({input, email})
        });

        const data = await response.json();

        if (!data || !data.result || typeof data.result !== "string") {
            throw new Error("Invalid server response");
        }

        clearInterval(interval);
        btn.style.setProperty("--progress", "100%");

        setTimeout(() => {
            const sections = data.result.split('---').map(s => s.trim());

            outputEl.innerHTML = `
                <div class="section">
                    <div class="formatted-output">${marked.parse(sections[0] || "")}</div>
                    <button class="copy-btn" onclick="copySection(0, this)">Copy</button>
                </div>
                <div class="section">
                    <div class="formatted-output">${marked.parse(sections[1] || "")}</div>
                    <button class="copy-btn" onclick="copySection(1, this)">Copy</button>
                </div>
                <div class="section">
                    <div class="formatted-output">${marked.parse(sections[2] || "")}</div>
                    <button class="copy-btn" onclick="copySection(2, this)">Copy</button>
                </div>
            `;

            outputEl.dataset.raw = data.result;

            btn.classList.remove("loading");
            btn.style.setProperty("--progress", "0%");
        }, 200);

    } catch (err) {
        clearInterval(interval);

        outputEl.innerHTML =
            `<div class="section"><p style="color:red;">Error generating CleanNotes™</p></div>`;

        btn.classList.remove("loading");
        btn.style.setProperty("--progress", "0%");
    }
}

// ===== COPY =====
window.copySection = async function(index, btn) {
    try {
        const raw = document.getElementById("output").dataset.raw;
        if (!raw) throw new Error("Nothing to copy");

        const sections = raw.split('---');
        const selected = (sections[index] || "").trim();

        let html = marked.parse(selected);

        html = html.replace(/<\/p>/g, '</p><p>&nbsp;</p>');
        html = html.replace(/(<p>&nbsp;<\/p>\s*){2,}/g, '<p>&nbsp;</p>');
        html = html.replace(/<(h1|h2|h3)>(.*?)<\/\1>/g,
            '<$1>$2</$1><p>&nbsp;</p>');
        html = html.replace(/<\/ul>/g, '</ul><p>&nbsp;</p>');
        html = html.replace(
            /<h4>Missing Information:<\/h4>/g,
            '<h4>Missing Information:</h4><p><span style="font-size:6px;">&nbsp;</span></p>'
        );

        html = `<html><body style="font-family:Arial; font-size:14px;">${html}</body></html>`;

        const text = selected
            .replace(/\*\*(.*?)\*\*/g, "$1")
            .replace(/^\s*[-*]\s+/gm, "• ")
            .replace(/\n{1,}/g, "\n\n")
            .trim();

        await navigator.clipboard.write([
            new ClipboardItem({
                "text/html": new Blob([html], { type: "text/html" }),
                "text/plain": new Blob([text], { type: "text/plain" })
            })
        ]);

        if (btn) {
            const original = btn.innerText;

            showAlert("Copied to clipboard", "success");

            btn.innerText = "Copied!";
            btn.classList.add("fade");

            setTimeout(() => {
                btn.innerText = original;
                setTimeout(() => btn.classList.remove("fade"), 300);
            }, 1200);
        }

    } catch (err) {
        showAlert("Copy failed: " + err.message);
    }
};

// ===== VOICE INPUT =====
let recognition;
let isRecording = false;
let restarting = false;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();

    const textarea = document.getElementById("inputText");
    const micBtn = document.getElementById("micBtn");

    micBtn.onclick = () => {
        if (!isRecording) {
            recognition.start();
            isRecording = true;
        } else {
            isRecording = false;
            recognition.stop();
        }
    };

    recognition.onstart = () => {
        micBtn.innerText = "⏹ Stop";
        micBtn.style.backgroundColor = "#f18d3b";
        micBtn.classList.add("pulsing");
    };

    recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
                textarea.value += event.results[i][0].transcript + " ";
            }
        }
    };

    recognition.onend = () => {
        if (isRecording && !restarting) {
            restarting = true;
            setTimeout(() => {
                try { recognition.start(); } catch {}
                restarting = false;
            }, 700);
        } else {
            micBtn.innerText = "🎤 Record Notes";
            micBtn.style.backgroundColor = "#2cd44a";
            micBtn.classList.remove("pulsing");
        }
    };

} else {
    document.getElementById("micBtn").style.display = "none";
}

</script>

</body>
</html>
