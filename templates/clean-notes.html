<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanNotes&trade;</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f7fa;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 150px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    box-sizing: border-box;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    background-color: #047ed4;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background-color: #1a5edb;
}

/* 🎤 mic button override */
#micBtn {
    width: auto;
    padding: 6px 10px;
    font-size: 14px;
    position: absolute;
    right: 10px;
    bottom: 10px;
    background-color: #2cd44a;
}

#micBtn:hover {
    background-color: #28bf43;
}

/* pulse animation */
.pulsing {
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(241,141,59, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(241,141,59, 0); }
    100% { box-shadow: 0 0 0 0 rgba(241,141,59, 0); }
}

.output {
    margin-top: 25px;
}

.section {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
}

.copy-btn {
    margin-top: 10px;
    font-size: 14px;
    padding: 8px;
    cursor: pointer;
    transition: opacity 0.3s ease;
}

.copy-btn.fade {
    opacity: 0.5;
}

/* Progress button */
#generateBtn {
    position: relative;
    overflow: hidden;
}

#generateBtn.loading {
    pointer-events: none;
    color: transparent;
}

#generateBtn.loading::after {
    content: "Generating...";
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: white;
}

#generateBtn.loading::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background-color: rgba(255,255,255,0.25);
    animation: progressBar 8s linear forwards;
}

@keyframes progressBar {
    from { width: 0%; }
    to { width: 100%; }
}

.formatted-output {
    line-height: 1.7;
    font-size: 16px;
}

.formatted-output p {
    margin: 0 0 15px 0;
}

.formatted-output h4 {
    margin-bottom: 2px;
}
</style>
</head>

<body>

<div class="container">
    <h1>
        Clean<span style="color: #047ed4;">Notes</span>&trade;<br>
        <span style="font-size: 75%">Clinical Documentation Engine</span>
    </h1>

    <input id="emailInput" type="email" placeholder="Enter your email (optional)">

    <div style="position: relative;">
        <textarea id="inputText" placeholder="Type or paste your raw clinical notes here..."></textarea>

        <button id="micBtn" type="button">🎤 Record Notes</button>
    </div>

    <button id="generateBtn" onclick="generateOutput()">
        Generate CleanNotes™
    </button>

    <div class="output" id="output"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
async function generateOutput() {
    const btn = document.getElementById("generateBtn");
    const input = document.getElementById("inputText").value;
    const email = document.getElementById("emailInput").value;

    if (!input.trim()) {
        alert("Please enter clinical notes.");
        return;
    }

    btn.classList.add("loading");

    try {
        const response = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({input, email})
        });

        const data = await response.json();
        const sections = data.result.split('---');

        document.getElementById("output").innerHTML = sections.map((s,i)=>`
            <div class="section">
                <div class="formatted-output">${marked.parse(s||"")}</div>
                <button class="copy-btn" onclick="copySection(${i}, this)">Copy</button>
            </div>
        `).join("");

        document.getElementById("output").dataset.raw = data.result;

    } catch (err) {
        document.getElementById("output").innerHTML =
            `<div class="section"><p style="color:red;">Error generating CleanNotes™.</p></div>`;
    } finally {
        btn.classList.remove("loading");
    }
}

// ===== VOICE INPUT FINAL =====
let recognition;
let isRecording = false;
let restarting = false;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();

    recognition.continuous = false;
    recognition.interimResults = false;

    const textarea = document.getElementById("inputText");
    const micBtn = document.getElementById("micBtn");

    micBtn.onclick = () => {
        if (!isRecording) {
            try {
                recognition.start();
                isRecording = true;
            } catch {}
        } else {
            isRecording = false;
            recognition.stop();
        }
    };

    recognition.onstart = () => {
        micBtn.innerText = "⏹ Stop";
        micBtn.style.backgroundColor = "#f18d3b"; //orange
        micBtn.classList.add("pulsing");
    };

    recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
                textarea.value += event.results[i][0].transcript + " ";
            }
        }
    };

recognition.onend = () => {
    if (isRecording && !restarting) {
        restarting = true;

        // Slight delay helps Chrome treat it as same session
        setTimeout(() => {
            try {
                recognition.start();
            } catch (e) {
                console.warn("Restart blocked:", e);
                isRecording = false; // fallback safety
            }
            restarting = false;
        }, 700); // 🔑 increase from 300 → 700
    } else {
        micBtn.innerText = "🎤 Record Notes";
       micBtn.style.backgroundColor = "#2cd44a"; // green
        micBtn.classList.remove("pulsing");
    }
};

    recognition.onerror = (event) => {
        console.error(event.error);
    };

} else {
    document.getElementById("micBtn").style.display = "none";
}
</script>

</body>
</html>
